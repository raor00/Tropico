    - { symbol: "USDT", desc: "El Tether que ya conocés, ahora en Solana. Más rápido y más barato que en Tron." }
    - { symbol: "JUP", desc: "Jupiter, el agregador de swaps de Solana. Cada swap en Tropico pasa por Jupiter." }
    - { symbol: "JTO", desc: "Jito, plataforma de staking que paga más que el normal. ~7-9% APY estimado." }
    - { symbol: "mSOL", desc: "Marinade Staked SOL. SOL pero ganando ~7% al año automático." }
    - { symbol: "KMNO", desc: "Kamino, banco descentralizado para préstamos y yields." }
    - { symbol: "RAY", desc: "Raydium, una de las primeras DEX de Solana." }
    - { symbol: "BONK", desc: "Memecoin oficial de Solana. Para divertirse, no para ahorrar." }

  modulos_app:
    - { id: "cambiar", desc: "Swap aggregator vía Jupiter. 0.5% platformFeeBps a Tropico." }
    - { id: "enviar", desc: "Send USDC + claim links por WhatsApp. 0.3% spread." }
    - { id: "guardar", desc: "Auto-yield via mSOL/Kamino. ~5% APY default ON." }
    - { id: "cobrar", desc: "QR Solana Pay para merchants. 1% al merchant." }
