  red_blockchain: "Solana mainnet"
  modelo_negocio: "5 streams de revenue: 0.5% swap, 0.3% send, 2% yield, 1% merchant fee, Guacama AI acelerador"
  tasa_bs_fuente: "ve.dolarapi.com (paralelo es la realidad VE)"

  tokens_curados:
    - { symbol: "SOL", desc: "El motor del ecosistema. Pagas comisiones con esto." }
